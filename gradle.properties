kotlin.code.style=official

# JDK в нестандартной папке (например D:\\AmazonCoretto) — чтобы Gradle видел toolchain:
org.gradle.java.installations.paths=D:/AmazonCoretto

# Если сборка падает с «compatible with Java 8», демон Gradle запущен на JDK 8.
# Раскомментируй и укажи путь к JDK 11+ (JBR из Android Studio тоже подходит):
# org.gradle.java.home=D:/AmazonCoretto
#
# Или всегда запускай:  .\run-dev.ps1 run
